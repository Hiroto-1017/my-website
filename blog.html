<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog | Hiroto Fujinami</title>
<meta name="description" content="Hiroto Fujinami のブログ。撮影・機材・登山にまつわる話を綴っています。">
<style>
  @font-face {
    font-family: 'Honoka Mincho';
    src: url('fonts/Honoka_Shin_Mincho_L.otf') format('opentype');
    font-weight: 300 700;
    font-display: swap;
  }

  :root {
    --bg: #0a0b0e;
    --bg-alt: #101217;
    --card: #14161c;
    --card-border: #22252d;
    --text: #edeff3;
    --text-dim: #9aa0ad;
    --accent: #8fd8c6;
    --accent-soft: rgba(143, 216, 198, 0.1);
    --shadow: rgba(0, 0, 0, 0.4);
    --max-width: 900px;
    --serif: 'Honoka Mincho', 'Hiragino Mincho ProN', 'Yu Mincho', serif;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    background: radial-gradient(circle at top, var(--bg-alt), var(--bg) 65%);
    color: var(--text);
    font-family: var(--serif);
    font-weight: 300;
    line-height: 2;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    font-synthesis: none;
  }

  /* ---------- Nav ---------- */
  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 20;
    display: flex;
    justify-content: center;
    gap: clamp(18px, 4vw, 40px);
    padding: 20px 16px;
    background: rgba(10, 11, 14, 0.75);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }

  nav a {
    color: var(--text-dim);
    text-decoration: none;
    font-family: var(--serif);
    font-size: 0.95rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    transition: color 0.25s ease;
    white-space: nowrap;
  }

  nav a:hover,
  nav a[aria-current="page"] {
    color: var(--accent);
  }

  main {
    padding: clamp(120px, 16vw, 160px) 16px clamp(72px, 10vw, 140px);
  }

  .wrap {
    max-width: var(--max-width);
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: clamp(56px, 9vw, 112px);
  }

  /* ---------- Fade-in animation ---------- */
  .reveal {
    opacity: 0;
    transform: translateY(28px);
    transition: opacity 1s ease, transform 1s ease;
  }
  .reveal.is-visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ---------- Eyebrow ---------- */
  .eyebrow {
    font-family: var(--serif);
    font-size: 0.85rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--accent);
    text-align: center;
    margin-bottom: 18px;
  }

  /* ---------- Page header ---------- */
  .page-header {
    text-align: center;
  }

  .page-header h1 {
    font-family: var(--serif);
    font-weight: 500;
    font-size: clamp(2.2rem, 5vw, 3.2rem);
    letter-spacing: 0.02em;
  }

  .page-header .divider {
    width: 48px;
    height: 1px;
    background: var(--accent);
    opacity: 0.5;
    margin: 26px auto;
  }

  .page-header .tagline {
    margin: 0 auto;
    max-width: 560px;
    color: var(--text-dim);
    font-size: clamp(0.9rem, 1.7vw, 1rem);
    font-weight: 300;
  }

  /* ---------- Card ---------- */
  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 24px;
    padding: clamp(32px, 6vw, 64px);
    box-shadow: 0 16px 50px var(--shadow);
  }

  /* ---------- Blog list ---------- */
  .blog-list {
    display: flex;
    flex-direction: column;
  }

  .blog-item {
    display: block;
    text-decoration: none;
    padding: 32px 0;
    border-bottom: 1px solid var(--card-border);
    transition: opacity 0.25s ease;
  }

  .blog-item:first-child {
    padding-top: 0;
  }

  .blog-item:last-child {
    padding-bottom: 0;
    border-bottom: none;
  }

  .blog-item:hover {
    opacity: 0.72;
  }

  .blog-date {
    font-family: var(--serif);
    color: var(--accent);
    font-size: 0.85rem;
    letter-spacing: 0.08em;
  }

  .blog-title {
    margin-top: 10px;
    font-family: var(--serif);
    font-weight: 500;
    font-size: clamp(1.15rem, 2.4vw, 1.4rem);
    color: var(--text);
    letter-spacing: 0.02em;
  }

  .blog-excerpt {
    margin-top: 12px;
    color: var(--text-dim);
    font-size: 0.92rem;
    font-weight: 300;
  }

  .blog-readmore {
    display: inline-block;
    margin-top: 16px;
    color: var(--accent);
    font-size: 0.85rem;
    letter-spacing: 0.05em;
  }

  /* ---------- Footer ---------- */
  footer {
    text-align: center;
    color: var(--text-dim);
    font-size: 0.78rem;
    letter-spacing: 0.04em;
  }

  .footer-links {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: clamp(16px, 4vw, 32px);
    margin-bottom: 18px;
  }

  .footer-links a {
    color: var(--text-dim);
    text-decoration: none;
    font-family: var(--serif);
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: color 0.25s ease;
  }

  .footer-links a:hover {
    color: var(--accent);
  }
</style>
</head>
<body>

  <nav class="reveal">
    <a href="index.html">Home</a>
    <a href="index.html#about">About</a>
    <a href="works.html">Works</a>
    <a href="blog.html" aria-current="page">Blog</a>
    <a href="index.html#contact">Contact</a>
  </nav>

  <main>
    <div class="wrap">

      <section class="page-header reveal">
        <p class="eyebrow">Blog</p>
        <h1>記事一覧</h1>
        <div class="divider"></div>
        <p class="tagline">
          撮影・機材・登山にまつわる話を、少しずつ綴っていきます。
        </p>
      </section>

      <section class="card reveal">
        <div class="blog-list">
          <a class="blog-item" href="blog/sample-post.html">
            <p class="blog-date">2026.07.11</p>
            <h3 class="blog-title">ブログを始めました</h3>
            <p class="blog-excerpt">
              このたび、撮影や機材にまつわる話を綴るブログを始めることにしました。三脚・特機のメンテナンスの現場で気づいたことや、登山で出会った風景、撮影の裏側などを少しずつ書いていく予定です。
            </p>
            <span class="blog-readmore">続きを読む →</span>
          </a>
        </div>
      </section>

      <footer class="reveal">
        <div class="footer-links">
          <a href="index.html">Home</a>
          <a href="index.html#about">About</a>
          <a href="works.html">Works</a>
          <a href="blog.html">Blog</a>
          <a href="index.html#contact">Contact</a>
        </div>
        <p>&copy; <span id="year"></span> Hiroto Fujinami. All rights reserved.</p>
      </footer>

    </div>
  </main>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  const revealEls = document.querySelectorAll('.reveal');

  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry, i) => {
      if (entry.isIntersecting) {
        setTimeout(() => entry.target.classList.add('is-visible'), i * 60);
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.12 });

  revealEls.forEach(el => observer.observe(el));
</script>
</body>
</html>
